# Configuración Railway para Laravel 11 - Versión Corregida

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs-18_x"]

[variables]
NIXPACKS_PHP_ROOT_DIR = "public"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "mkdir -p bootstrap/cache",
    "mkdir -p storage/framework/cache/data",
    "mkdir -p storage/framework/sessions",
    "mkdir -p storage/framework/views",
    "mkdir -p storage/logs",
    "chmod -R 775 bootstrap/cache",
    "chmod -R 775 storage",
    "npm run build",
    "chmod +x railway-init.sh",
    "./railway-init.sh",
    "php artisan key:generate --force",
    "php artisan config:clear",
    "php artisan cache:clear",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

# No incluimos migraciones en build - Railway las ejecutará por separado