# Configuración Railway para Laravel 11 - Versión Corregida

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs-18_x"]

[variables]
NIXPACKS_PHP_ROOT_DIR = "public"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "mkdir -p bootstrap/cache",
    "mkdir -p storage/framework/cache/data",
    "mkdir -p storage/framework/sessions",
    "mkdir -p storage/framework/views",
    "mkdir -p storage/logs",
    "chmod -R 775 bootstrap/cache",
    "chmod -R 775 storage",
    "npm run build",
    "chmod +x railway-init.sh",
    "./railway-init.sh",
    "rm -f bootstrap/cache/*.php",
    "rm -rf storage/framework/cache/data/*",
    "rm -rf storage/framework/views/*",
    "rm -rf storage/framework/sessions/*",
    "php artisan key:generate --force",
    "php artisan config:clear --env=production",
    "php artisan cache:clear --env=production",
    "php artisan route:clear --env=production",
    "php artisan view:clear --env=production",
    "php artisan route:cache --env=production",
    "php artisan view:cache --env=production"
]

# No incluimos migraciones en build - Railway las ejecutará por separado